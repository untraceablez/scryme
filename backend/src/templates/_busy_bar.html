{# Indeterminate progress bar shown while an upload posts. Needs a `busy` boolean in the
   enclosing x-data scope. #}
<div x-show="busy" x-cloak class="mt-3">
  <div class="w-full h-2 rounded-full bg-surface-2 overflow-hidden border border-edge">
    <div class="h-full w-1/3 bg-accent rounded-full busy-indeterminate"></div>
  </div>
</div>
