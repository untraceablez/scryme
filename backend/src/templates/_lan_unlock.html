{% extends "base.html" %}
{% block title %}Access code · scryme{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto px-4 py-24 text-center">
  {% include "_brand.html" %}
  <h1 class="mt-8 text-lg font-semibold">Enter access code</h1>
  <p class="mt-2 text-muted text-sm">This scryme collection is shared with an access code.</p>
  <form action="/" method="get" class="mt-6 flex gap-2">
    <input type="text" name="code" autofocus placeholder="code"
      class="flex-1 rounded-lg bg-surface border border-edge px-4 py-2
             focus:outline-none focus:ring-2 focus:ring-accent" />
    <button type="submit"
      class="rounded-lg bg-accent text-accent-fg px-4 py-2 font-medium hover:opacity-90">Go</button>
  </form>
</div>
{% endblock %}
