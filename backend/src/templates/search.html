{% extends "base.html" %}
{% block title %}Search · scryme{% endblock %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 py-6">
  <header class="flex flex-wrap items-center gap-3 mb-6">
    <a href="/" class="text-2xl font-bold tracking-tight shrink-0">
      <span class="text-accent">scry</span>me
    </a>
    <form
      class="order-last w-full sm:order-none sm:w-auto flex-1 flex gap-2"
      hx-get="/search"
      hx-target="#results"
      hx-push-url="true"
      hx-trigger="submit, keyup changed delay:350ms from:input[name=q], change from:select[name=scope]"
    >
      <input
        type="search"
        name="q"
        value="{{ q }}"
        autofocus
        placeholder="Search — e.g. c:r t:instant mv<=2"
        class="flex-1 min-w-0 rounded-full bg-surface border border-edge px-5 py-2.5
               focus:outline-none focus:ring-2 focus:ring-accent"
      />
      <select name="scope"
        class="rounded-full bg-surface border border-edge px-3 py-2.5 text-sm">
        <option value="collection" {% if scope == 'collection' %}selected{% endif %}>My collection</option>
        <option value="all" {% if scope == 'all' %}selected{% endif %}>All cards</option>
      </select>
    </form>
    <a href="/upload"
       class="ml-auto shrink-0 rounded-full bg-surface-2 hover:bg-surface-3 px-4 py-2 text-sm font-medium">
      + Upload
    </a>
  </header>

  <div id="results">
    {% include "search_results.html" %}
  </div>
</div>
{% endblock %}
