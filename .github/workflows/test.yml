name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scryme
          POSTGRES_PASSWORD: scryme
          POSTGRES_DB: scryme_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scryme"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SCRYME_DATABASE_URL: postgresql+asyncpg://scryme:scryme@localhost:5432/scryme_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check src tests
      - name: Run tests
        run: pytest tests/
