name: Desktop release

# Builds the desktop installers on each OS and publishes them (plus the electron-updater
# latest*.yml manifests) to the GitHub Release, so the in-app auto-updater has a source.
#
# Triggered when a release is published, or manually. Code signing is optional: set the secrets
# noted below and electron-builder will sign/notarize; without them it ships unsigned installers
# (auto-update still works for the Linux AppImage and Windows NSIS; macOS users may need to allow
# the app on first open).
on:
  release:
    types: [published]
  workflow_dispatch:

# Needed for electron-builder to upload installers to the GitHub Release via GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    # One runner per OS+arch — PyInstaller can't cross-compile the backend, and electron-builder
    # builds for the host arch, so each arch is built natively. Windows stays x64 (embedded-postgres
    # has no windows-arm64 binary; x64 runs on Windows-on-ARM via emulation). Each job produces
    # arch-suffixed installers; the electron-updater latest*.yml is merged per platform as jobs
    # publish.
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS is Apple Silicon only — every Mac since 2023 is arm64, and the Intel (macos-13)
          # runner is chronically slow to schedule on the free tier.
          - { os: macos-14, label: macOS arm64 }
          - { os: windows-latest, label: Windows x64 }
          - { os: ubuntu-latest, label: Linux x64 }
          # arm64 Linux: AppImage only — the bundled fpm (for .deb) is x86-only.
          - { os: ubuntu-24.04-arm, label: Linux arm64, ebargs: "--linux AppImage" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Freeze the backend (PyInstaller, native to this OS)
        env:
          SCRYME_BUILD_NO_DOCKER: "1"
          SCRYME_BUILD_PYTHON: python
        run: npm run build:backend

      - name: Install desktop dependencies
        run: npm ci

      - name: Build and publish installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Don't attempt macOS signing unless certs are provided (keeps unsigned builds green).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Optional signing/notarization — set these as repo secrets to enable:
          #   Windows/macOS: CSC_LINK, CSC_KEY_PASSWORD
          #   macOS notarize: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
        run: npx --no-install electron-builder --publish always ${{ matrix.ebargs }}

  # electron-builder also uploads .blockmap files (delta-update helpers). Auto-update works fine
  # without them (it falls back to a full download), so drop them to keep the release tidy. The
  # latest*.yml feeds are kept — the in-app updater reads those from the release.
  tidy:
    name: Tidy release assets
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Remove .blockmap files from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v$(jq -r .version desktop/package.json)"
          for a in $(gh release view "$tag" --repo "$GITHUB_REPOSITORY" \
                       --json assets -q '.assets[].name' | grep -E '\.blockmap$' || true); do
            echo "deleting $a"
            gh release delete-asset "$tag" "$a" --repo "$GITHUB_REPOSITORY" --yes
          done
