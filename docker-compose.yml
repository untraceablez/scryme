# Production / self-host stack. `docker compose up -d` brings up the full app.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scryme
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scryme}
      POSTGRES_DB: scryme
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scryme"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [scryme-network]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SCRYME_ENVIRONMENT: production
      SCRYME_DATABASE_URL: postgresql+asyncpg://scryme:${POSTGRES_PASSWORD:-scryme}@postgres:5432/scryme
      SCRYME_DATA_DIR: /data
      SCRYME_IMAGE_CACHE_DIR: /data/images
      SCRYME_READ_ONLY: ${SCRYME_READ_ONLY:-false}
    volumes:
      - scryme-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks: [scryme-network]

  nginx:
    image: nginx:alpine
    ports:
      - "${SCRYME_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - scryme-data:/data:ro
    depends_on:
      - backend
    networks: [scryme-network]

volumes:
  postgres-data:
  scryme-data:

networks:
  scryme-network:
    driver: bridge
