# Local development stack with hot reload. `docker compose -f docker-compose.dev.yml up`.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scryme
      POSTGRES_PASSWORD: scryme
      POSTGRES_DB: scryme
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scryme"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      SCRYME_ENVIRONMENT: development
      SCRYME_DEBUG: "true"
      SCRYME_DATABASE_URL: postgresql+asyncpg://scryme:scryme@postgres:5432/scryme
      SCRYME_DATA_DIR: /data
      SCRYME_IMAGE_CACHE_DIR: /data/images
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - scryme-data-dev:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data-dev:
  scryme-data-dev:
