apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: scryme-demo

# Apply your secret first (see secret.example.yaml); it is intentionally not part of this
# kustomization so credentials never live in git.
resources:
  - namespace.yaml
  - postgres.yaml
  - backend.yaml

images:
  - name: ghcr.io/untraceablez/scryme
    newTag: latest
