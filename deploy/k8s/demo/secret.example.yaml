# Copy to secret.yaml and change the password. secret.yaml is gitignored.
# POSTGRES_PASSWORD and the password inside SCRYME_DATABASE_URL MUST match.
apiVersion: v1
kind: Secret
metadata:
  name: scryme-demo-secrets
  namespace: scryme-demo
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me"
  SCRYME_DATABASE_URL: "postgresql+asyncpg://scryme:change-me@scryme-demo-postgres:5432/scryme"
