# Copy to secret.yaml and set a real password. secret.yaml is gitignored.
# This single password is used by Postgres (POSTGRES_PASSWORD) and by the app's database URL,
# which is built from it in backend.yaml — so they can never drift.
apiVersion: v1
kind: Secret
metadata:
  name: scryme-demo-secrets
  namespace: scryme-demo
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me"
