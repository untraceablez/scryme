apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scryme-demo-postgres-data
  namespace: scryme-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scryme-demo-postgres
  namespace: scryme-demo
  labels:
    app: scryme-demo-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate  # single RWO volume, never two pods attached at once
  selector:
    matchLabels:
      app: scryme-demo-postgres
  template:
    metadata:
      labels:
        app: scryme-demo-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: scryme
            - name: POSTGRES_DB
              value: scryme
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scryme-demo-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "scryme"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scryme-demo-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: scryme-demo-postgres
  namespace: scryme-demo
spec:
  selector:
    app: scryme-demo-postgres
  ports:
    - port: 5432
      targetPort: 5432
