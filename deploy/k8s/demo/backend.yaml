apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scryme-demo-data
  namespace: scryme-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi  # downloaded bulk file + cached images
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scryme-demo
  namespace: scryme-demo
  labels:
    app: scryme-demo
spec:
  replicas: 1
  strategy:
    type: Recreate  # single RWO data volume
  selector:
    matchLabels:
      app: scryme-demo
  template:
    metadata:
      labels:
        app: scryme-demo
    spec:
      # The image runs as non-root uid 1000; fsGroup makes the freshly-provisioned /data PVC
      # group-writable so ingest can download the bulk file and cache images.
      securityContext:
        fsGroup: 1000
      # Pull the private GHCR image. Create this secret first (see README); harmless/ignored if
      # the package is public.
      imagePullSecrets:
        - name: ghcr-pull
      # One-time (idempotent) data load: wait for Postgres, migrate, ingest the Scryfall
      # bulk file, and seed a sample collection. The 24h guard + persistent DB make reruns cheap.
      initContainers:
        - name: ingest-and-seed
          image: ghcr.io/leyline-coding/scryme:latest
          imagePullPolicy: Always
          workingDir: /app
          command: ["sh", "-c"]
          args:
            - |
              set -e
              until python -c "import socket; socket.create_connection(('scryme-demo-postgres', 5432), 3)" 2>/dev/null; do
                echo "waiting for postgres..."; sleep 2;
              done
              alembic upgrade head
              # Ingest only on first boot (empty DB). The card DB persists on the PVC, so later
              # restarts skip the ~115k-card ingest and the pod becomes Ready in seconds — keeping
              # the Recreate-strategy downtime minimal even when Scryfall has a newer bulk file.
              CARDS=$(python -c "import asyncio; from src.scryfall.ingest import current_card_count; print(asyncio.run(current_card_count()))")
              if [ "${CARDS:-0}" -lt 1000 ]; then
                python -m src.cli ingest
              else
                echo "cards already present ($CARDS); skipping ingest"
              fi
              python -m src.cli seed-demo --limit 60
          envFrom:
            - configMapRef:
                name: scryme-demo-config
          env:
            # Password is passed as a discrete part; the app URL-encodes it, so it may contain
            # @ : / and other characters that would break a hand-built connection string.
            - name: SCRYME_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scryme-demo-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      containers:
        - name: scryme
          image: ghcr.io/leyline-coding/scryme:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: scryme-demo-config
          env:
            - name: SCRYME_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scryme-demo-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scryme-demo-data
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scryme-demo-config
  namespace: scryme-demo
data:
  SCRYME_ENVIRONMENT: "production"
  SCRYME_DATA_DIR: "/data"
  SCRYME_IMAGE_CACHE_DIR: "/data/images"
  SCRYME_READ_ONLY: "true"
  SCRYME_DB_HOST: "scryme-demo-postgres"
  SCRYME_DB_PORT: "5432"
  SCRYME_DB_USER: "scryme"
  SCRYME_DB_NAME: "scryme"
---
apiVersion: v1
kind: Service
metadata:
  name: scryme-demo
  namespace: scryme-demo
spec:
  selector:
    app: scryme-demo
  ports:
    - port: 8000
      targetPort: 8000
