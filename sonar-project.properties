sonar.projectKey=scryme
sonar.projectName=Scryme
sonar.sourceEncoding=UTF-8

# Production sources
sonar.sources=backend/src

# Tests
sonar.tests=backend/tests

# Coverage (pytest --cov-report=xml emits Cobertura XML)
sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclusions
sonar.exclusions=backend/alembic/**,**/__pycache__/**,backend/src/static/**,backend/src/templates/**
sonar.coverage.exclusions=backend/tests/**,backend/src/main.py,backend/alembic/**
